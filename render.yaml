services:
  - type: web
    name: brain-mri-triage
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: "sh -c 'uvicorn brain_mri_triage.app:create_app --factory --host 0.0.0.0 --port $PORT'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
